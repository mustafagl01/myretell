services:
  - type: web
    name: myvoiceagent-backend
    env: node
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    nodeVersion: 18
    envVars:
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: PORT
        value: 3001
      - key: RUBE_API_KEY
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
