<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Voice Agent - Real-Time Voice AI Assistant</title>
    <meta name="description" content="Real-Time Voice AI Assistant powered by Deepgram Voice Agent SDK">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .status-section {
            margin-bottom: 30px;
        }

        .status-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            transition: background 0.3s ease;
        }

        .status-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .status-indicator.disconnected {
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .status-indicator.connected {
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        .status-indicator.connecting {
            background: #eab308;
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.5);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-indicator.inactive {
            background: #6b7280;
        }

        .status-indicator.active {
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        .status-label {
            color: #d1d5db;
            font-size: 0.95rem;
            flex: 1;
        }

        .status-value {
            color: #9ca3af;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .controls-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .btn-stop:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .error-section {
            margin-top: 20px;
            padding: 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            display: none;
        }

        .error-section.visible {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-title {
            color: #fca5a5;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-message {
            color: #fca5a5;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .audio-level {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .audio-level-label {
            color: #d1d5db;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .audio-level-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .audio-level-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
            width: 0%;
            transition: width 0.1s ease;
            border-radius: 3px;
        }

        .buffer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }

        .buffer-stat {
            color: #9ca3af;
            font-size: 0.75rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Voice Agent</h1>
            <p>Real-Time Voice AI Assistant powered by Deepgram</p>
        </div>

        <div class="card">
            <!-- Status Section -->
            <div class="status-section">
                <div class="status-item">
                    <div class="status-indicator disconnected" id="connectionIndicator"></div>
                    <div class="status-label">Connection</div>
                    <div class="status-value" id="connectionStatus">Disconnected</div>
                </div>
                <div class="status-item">
                    <div class="status-indicator inactive" id="microphoneIndicator"></div>
                    <div class="status-label">Microphone</div>
                    <div class="status-value" id="microphoneStatus">Inactive</div>
                </div>
                <div class="status-item">
                    <div class="status-indicator inactive" id="audioIndicator"></div>
                    <div class="status-label">Audio Playback</div>
                    <div class="status-value" id="audioStatus">Stopped</div>
                </div>
            </div>

            <!-- Controls Section -->
            <div class="controls-section">
                <button class="btn btn-start" id="startButton">
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                    Start Conversation
                </button>
                <button class="btn btn-stop" id="stopButton" disabled>
                    <svg class="icon" viewBox="0 0 24 24">
                        <path d="M6 6h12v12H6z"/>
                    </svg>
                    Stop Conversation
                </button>
            </div>

            <!-- Audio Level Section -->
            <div class="audio-level hidden" id="audioLevelSection">
                <div class="audio-level-label">Buffer Level</div>
                <div class="audio-level-bar">
                    <div class="audio-level-fill" id="bufferLevelFill"></div>
                </div>
                <div class="buffer-info">
                    <span class="buffer-stat" id="bufferDepth">0 chunks</span>
                    <span class="buffer-stat">Target: 3-5 chunks</span>
                </div>
            </div>

            <!-- Error Section -->
            <div class="error-section" id="errorSection">
                <div class="error-title">
                    <svg class="icon" style="width: 16px; height: 16px;" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    Error
                </div>
                <div class="error-message" id="errorMessage"></div>
            </div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
